name: "Provision DevOps-Commander (Azure)"

# Reuses the same reusable Terraform workflow as ERP_Infra.
# Single environment (prod) — the Function App is shared across all ERP environments.

on:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  prod:
    uses: PixelTech-Solutions/Terraform/.github/workflows/terraform.yml@main
    with:
      working_directory: ./infra/azure
      environment: prod
      project_name: devops-commander
      service_name: alert-receiver
    secrets: inherit

  # Self-healing hook: if provisioning fails, tell DevOps Commander so it can
  # diagnose the failed run (read-only GitHub MCP) and email a gated fix.
  # Best-effort — never changes this run's outcome. Requires repo variable
  # FUNCTION_APP_NAME and secret ALERT_SHARED_SECRET (same value as the app
  # setting); skips silently if either is missing.
  notify-failure:
    name: Notify DevOps Commander on failure
    needs: [prod]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: POST the failed run to /api/pipeline
        env:
          FUNCTION_APP_NAME: ${{ vars.FUNCTION_APP_NAME }}
          PIPELINE_TOKEN: ${{ secrets.ALERT_SHARED_SECRET }}
        run: |
          if [ -z "$FUNCTION_APP_NAME" ] || [ -z "$PIPELINE_TOKEN" ]; then
            echo "FUNCTION_APP_NAME or ALERT_SHARED_SECRET missing — skipping notify."
            exit 0
          fi
          url="https://${FUNCTION_APP_NAME}.azurewebsites.net/api/pipeline"
          payload=$(jq -n \
            --arg repo "${{ github.repository }}" \
            --arg workflow "${{ github.workflow }}" \
            --arg workflow_ref "${{ github.workflow_ref }}" \
            --arg run_id "${{ github.run_id }}" \
            --arg run_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg branch "${{ github.ref_name }}" \
            --arg head_sha "${{ github.sha }}" \
            --arg event "${{ github.event_name }}" \
            --arg actor "${{ github.actor }}" \
            '{repo:$repo, workflow:$workflow, workflow_ref:$workflow_ref, run_id:$run_id, run_url:$run_url, branch:$branch, head_sha:$head_sha, event:$event, actor:$actor}')
          echo "Notifying $url"
          code=$(curl -s -o /tmp/resp -w "%{http_code}" -X POST "$url" \
            -H "X-Pipeline-Token: ${PIPELINE_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$payload" || echo 000)
          echo "HTTP $code"
          cat /tmp/resp 2>/dev/null || true
          exit 0
